spring:
  application:
    name: segment-metric-service

  datasource:
    user-slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${USER_DB_SLAVE_HOST}:3306/${USER_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
      username: ${USER_DB_USERNAME}
      password: ${USER_DB_PASSWORD}
      hikari:
        maximum-pool-size: 30
        minimum-idle: 10
        connection-timeout: 30000
        max-lifetime: 1800000
        leak-detection-threshold: 60000
        read-only: true
        pool-name: UserSlave-HikariCP
        initialization-fail-timeout: -1

    segment-master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${SEGMENT_DB_HOST}:3306/${SEGMENT_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
      username: ${SEGMENT_DB_USERNAME}
      password: ${SEGMENT_DB_PASSWORD}
      hikari:
        maximum-pool-size: 30
        minimum-idle: 10
        connection-timeout: 30000
        max-lifetime: 1800000
        leak-detection-threshold: 60000
        pool-name: SegmentMaster-HikariCP
        initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false                    # ????? ? ??? false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 100
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        dialect: org.hibernate.dialect.MySQLDialect

    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

batch:
  chunk-size: 1000

server:
  tomcat:
    threads:
      max: 200
      min-spare: 20
    connection-timeout: 20s

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics,info,threaddump
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        batch.segment.count.duration: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
        batch.segment.count.duration: 0.5,0.95,0.99
      maximum-expected-value:
        batch.segment.count.duration: 5m
      minimum-expected-value:
        batch.segment.count.duration: 1ms
    tags:
      application: segment-metric-service
      environment: ${ENV:local}

logging:
  level:
    org.hibernate.SQL: INFO
    com.zaxxer.hikari: INFO
    com.querydsl.sql: DEBUG